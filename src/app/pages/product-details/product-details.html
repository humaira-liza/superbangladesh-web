<div
  class="product-details"
  *ngIf="product"
>

  <!-- LEFT -->

  <div class="left">

    <img
      [src]="apiUrl + '/images/' + product.imageUrl"
      [alt]="product.name"
    />

  </div>

  <!-- RIGHT -->

  <div class="right">

    <p class="category">
      {{product.categoryName}}
    </p>

    <h1>
      {{product.name}}
    </h1>

    <h2>
      ৳ {{product.price}}
    </h2>

    <p class="stock">
      Stock :
      {{product.stock}}
      {{product.stockUnit}}
    </p>

    <p class="description">
      {{product.description}}
    </p>

    <button
      (click)="addToCart()"
    >
      Add To Cart
    </button>

  </div>

</div>
