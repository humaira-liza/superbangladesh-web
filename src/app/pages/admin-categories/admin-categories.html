<h2>📂 Categories</h2>

<div class="form">

  <input
    [(ngModel)]="form.name"
    placeholder="Category Name">

  <select [(ngModel)]="form.parentId">

    <option [ngValue]="null">
      Main Category
    </option>

    <option
      *ngFor="let c of categories"
      [ngValue]="c.id">

      {{ c.name }}

    </option>

  </select>

  <button (click)="save()">
    Add Category
  </button>

</div>

<hr>

<div *ngFor="let c of categories">

  <p>{{ c.name }}</p>

</div>
