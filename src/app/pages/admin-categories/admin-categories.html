<h2>📂 Categories</h2>

<div class="form">

  <input
    [(ngModel)]="form.name"
    placeholder="Category Name">

  <select [(ngModel)]="form.parentId">

    <option [ngValue]="null">
      Main Category
    </option>

    <ng-container *ngFor="let c of categories">

  <option
    *ngIf="!c.parent"
    [ngValue]="c.id">

    {{ c.name }}

  </option>

</ng-container>

  </select>

  <button (click)="save()">
    Add Category
  </button>

</div>

<hr>

<div *ngFor="let c of categories">

  <p>{{ c.name }}</p>

</div>
