<h2>📂 Categories</h2>

<div class="form">

  <input
    [(ngModel)]="form.name"
    placeholder="Category Name">

  <input
    type="file"
    (change)="onFileSelected($event)">

  <!-- IMAGE PREVIEW -->

  <div *ngIf="previewImage">

    <img
      [src]="previewImage"
      width="120"
      height="120"
      style="
        margin:10px 0;
        border-radius:12px;
        object-fit:cover;
        border:1px solid #ddd;">

  </div>

  <!-- TYPE -->

  <select [(ngModel)]="form.type">

    <option value="MAIN">
      Main Category
    </option>

    <option value="SUB">
      Sub Category
    </option>

    <option value="CHILD">
      Child Category
    </option>

  </select>

  <!-- SUB -->

  <select
    *ngIf="form.type === 'SUB'"
    [(ngModel)]="form.parentId">

    <option [ngValue]="null">
      Select Main Category
    </option>

    <option
      *ngFor="let c of mainCategories"
      [ngValue]="c.id">

      {{ c.name }}

    </option>

  </select>

  <!-- CHILD -->

  <select
    *ngIf="form.type === 'CHILD'"
    [(ngModel)]="form.parentId">

    <option [ngValue]="null">
      Select Sub Category
    </option>

    <option
      *ngFor="let c of subCategories"
      [ngValue]="c.id">

      {{ c.parent?.name }} → {{ c.name }}

    </option>

  </select>

  <button (click)="save()">

    {{ editingId
      ? 'Update Category'
      : 'Add Category' }}

  </button>

</div>

<hr>

<!-- MAIN -->

<div *ngFor="let main of categories">

  <div class="main-row">

    <img
      *ngIf="main.imageUrl"
      [src]="imageBase + main.imageUrl"
      width="60"
      height="60">

    <span class="main-name">
      {{ main.name }}
    </span>

    <button (click)="edit(main)">
      Edit
    </button>

    <button (click)="delete(main.id)">
      Delete
    </button>

  </div>

  <!-- SUB -->

  <div
    *ngFor="let sub of main.children"
    class="sub-row">

    <img
      *ngIf="sub.imageUrl"
      [src]="imageBase + sub.imageUrl"
      width="50"
      height="50">

    ↳ {{ sub.name }}

    <button (click)="edit(sub)">
      Edit
    </button>

    <button (click)="delete(sub.id)">
      Delete
    </button>

  </div>

  <!-- CHILD -->

  <div
    *ngFor="let sub of main.children">

    <div
      *ngFor="let child of sub.children"
      class="child-row">

      <img
        *ngIf="child.imageUrl"
        [src]="imageBase + child.imageUrl"
        width="40"
        height="40">

      ↳↳ {{ child.name }}

      <button (click)="edit(child)">
        Edit
      </button>

      <button (click)="delete(child.id)">
        Delete
      </button>

    </div>

  </div>

</div>
