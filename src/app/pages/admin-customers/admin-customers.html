<div class="customers-page">

  <h1>👥 Customer Management</h1>

  <div
    class="customer-card"
    *ngFor="let c of customers"
  >

    <h2>{{ c.email }}</h2>

    <p><b>ID:</b> {{ c.id }}</p>

    <p><b>Email:</b> {{ c.email }}</p>

    <p><b>Role:</b> {{ c.role }}</p>

    <div class="actions">

      <button class="block-btn">
        Block
      </button>

      <button class="delete-btn">
        Delete
      </button>

    </div>

  </div>

</div>
