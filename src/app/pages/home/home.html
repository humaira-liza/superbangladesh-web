<div class="page">

  <div class="layout">


    <!-- =========================
         DESKTOP SIDEBAR
         ALWAYS OPEN
    ========================== -->

    <aside class="desktop-sidebar">

      <app-sidebar>
      </app-sidebar>

    </aside>


    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main class="main-content">


   <!-- BANNER -->

<app-banner
  *ngIf="!currentSearch"
>
</app-banner>


<!-- FEATURES -->

<app-features
  *ngIf="!currentSearch"
>
</app-features>


      <!-- =========================
           TRENDING / SEARCH PRODUCTS
      ========================== -->

      <section
        #productsSection
        class="trending-section"
      >

        <div class="trending-header">

          <h2>
            {{
              currentSearch
                ? 'Search Results'
                : 'Trending'
            }}
          </h2>


          <button
            *ngIf="!currentSearch && originalProducts.length > 0"
            type="button"
            class="see-all-btn"
            (click)="toggleAllTrending()"
          >

            {{
              showAllTrending
                ? 'Show Less'
                : 'See All'
            }}

            ❯❯

          </button>

        </div>


        <!-- =========================
             PRODUCT GRID
        ========================== -->

        <div
          class="trending-grid"
          *ngIf="
            (
              currentSearch
                ? filtered
                : (
                    showAllTrending
                      ? originalProducts
                      : featuredProducts
                  )
            ).length > 0
          "
        >

          <article
            class="trending-card"

            *ngFor="
              let p of (
                currentSearch
                  ? filtered
                  : (
                      showAllTrending
                        ? originalProducts
                        : featuredProducts
                    )
              );
              trackBy: trackByProduct
            "

            [class.out-product]="
              p.stock <= 0
            "
          >


            <div class="trending-image-box">


              <!-- OUT OF STOCK -->

              <div
                class="out-badge"
                *ngIf="p.stock <= 0"
              >
                Out Of Stock
              </div>


              <!-- PRODUCT IMAGE -->

              <img
                loading="lazy"
                decoding="async"

                [src]="
                  getImage(
                    p.imageUrl ||
                    p.image_url
                  )
                "

                (error)="
                  onImgError($event)
                "

                [alt]="p.name"
              />


              <!-- ADD BUTTON -->

              <button
                *ngIf="
                  p.stock > 0 &&
                  !isInCart(p)
                "

                type="button"

                class="trending-add-btn"

                (click)="
                  addToCart(
                    p,
                    $event
                  )
                "
              >
                +
              </button>


              <!-- QUANTITY CONTROL -->

              <div
                *ngIf="
                  p.stock > 0 &&
                  isInCart(p)
                "

                class="trending-qty-control"
              >


                <button
                  type="button"

                  (click)="
                    decreaseQty(
                      p,
                      $event
                    )
                  "
                >
                  −
                </button>


                <span>
                  {{ getCartQty(p) }}
                </span>


                <button
                  type="button"

                  (click)="
                    increaseQty(
                      p,
                      $event
                    )
                  "
                >
                  +
                </button>

              </div>

            </div>


            <!-- PRODUCT NAME -->

            <h3>
              {{ p.name }}
            </h3>


            <!-- UNIT -->

            <p
              class="trending-unit"

              *ngIf="
                p.quantity &&
                p.unit
              "
            >
              {{ p.quantity }}
              {{ p.unit }}
            </p>


            <!-- PRICE -->

            <div class="trending-price-line">

              <span class="trending-old-price">
                ৳{{ p.price + 20 }}
              </span>


              <span class="trending-price">
                ৳{{ p.price }}
              </span>

            </div>

          </article>

        </div>


        <!-- =========================
             NO SEARCH RESULT
        ========================== -->

        <div
          *ngIf="
            currentSearch &&
            filtered.length === 0
          "
          class="no-search-result"
        >

          <h3>
            No products found
          </h3>

          <p>
            No product matched "{{ currentSearch }}"
          </p>

        </div>

      </section>


      <!-- =========================
           POPULAR CATEGORIES

           SEARCH করলে HIDE
      ========================== -->

      <section
        class="popular-section"

        *ngIf="
          !currentSearch &&
          popularCategories.length > 0
        "
      >

        <h2>
          🔥 Popular Categories
        </h2>


        <div class="popular-grid-container">

          <div class="popular-grid">

            <div
              class="popular-card"

              *ngFor="
                let c of popularCategories
              "

              (click)="
                onCategory(c)
              "
            >

              <img
                loading="lazy"
                decoding="async"

                [src]="
                  getCategoryImage(
                    c.imageUrl ||
                    c.image_url
                  )
                "

                (error)="
                  onImgError($event)
                "
              />


              <p>
                {{ c.name }}
              </p>

            </div>

          </div>

        </div>

      </section>


      <!-- =========================
           SHOP MORE

           SEARCH করলে HIDE
      ========================== -->

      <app-shop-more
        *ngIf="!currentSearch"
      >
      </app-shop-more>


      <!-- =========================
           POPULAR BRANDS

           SEARCH করলে HIDE
      ========================== -->

      <app-popular-brands
        *ngIf="!currentSearch"
      >
      </app-popular-brands>


    </main>


    <!-- =========================
         MOBILE ORDER BAR
    ========================== -->

    <div class="mobile-order-bar">

      <button
        type="button"
        class="chat-btn"
      >
        💬
      </button>


      <button
        type="button"
        class="order-btn"
      >
        Place Order
      </button>

    </div>

  </div>

</div>


<!-- =========================
     FOOTER
========================== -->

<app-footer>
</app-footer>
