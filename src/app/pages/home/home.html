<div class="page">

  <div class="layout">

    <!-- =========================
         DESKTOP SIDEBAR
         ALWAYS OPEN
    ========================== -->

    <aside class="desktop-sidebar">

      <app-sidebar>
      </app-sidebar>

    </aside>


    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main class="main-content">


      <!-- =========================
           BANNER
      ========================== -->

      <app-banner
        *ngIf="!currentSearch"
      >
      </app-banner>


      <!-- =========================
           FEATURES
      ========================== -->

      <app-features
        *ngIf="!currentSearch"
      >
      </app-features>


      <!-- =========================
           POPULAR CATEGORIES
      ========================== -->

      <section
        class="popular-section"

        *ngIf="
          !currentSearch &&
          popularCategories.length > 0
        "
      >

        <h2>
          🔥 {{ t('popularCategories') }}
        </h2>


        <div class="popular-grid-container">

          <div class="popular-grid">

            <div
              class="popular-card"

              *ngFor="
                let c of popularCategories
              "

              (click)="
                onCategory(c)
              "
            >

              <img
                loading="lazy"
                decoding="async"

                [src]="
                  getCategoryImage(
                    c.imageUrl ||
                    c.image_url
                  )
                "

                (error)="
                  onImgError($event)
                "
              />


              <p>
                {{ categoryName(c) }}
              </p>

            </div>

          </div>

        </div>

      </section>


      <!-- =========================
           SHOP MORE
      ========================== -->

      <app-shop-more
        *ngIf="!currentSearch"
      >
      </app-shop-more>


      <!-- =========================
           POPULAR BRANDS
      ========================== -->

     <app-popular-brands
  *ngIf="!currentSearch"
>
</app-popular-brands>

<div *ngIf="currentSearch">


  <div class="product-grid">

    <article
      class="product-card"
      [class.out-product]="p.stock <= 0"
      *ngFor="
        let p of filtered;
        trackBy: trackByProduct
      ">

      <div class="product-image">

        <div
          class="out-badge"
          *ngIf="p.stock <= 0">

          Out Of Stock

        </div>

        <img
          loading="lazy"
          decoding="async"
          [src]="getImage(p.imageUrl || p.image_url || p.imageUrl1)"
          (error)="onImgError($event)"
        />

        <button
          type="button"
          class="add-btn"
          *ngIf="p.stock > 0"
          (click)="addToCart(p,$event)">

          +

        </button>

      </div>

      <div class="product-info">

        <div class="price-line">

          <span class="price">
            ৳{{ p.price }}
          </span>

          <span
            class="old-price"
            *ngIf="p.price">

            ৳{{ p.price + 20 }}

          </span>

        </div>

        <h3>
          {{ p.name }}
        </h3>

        <p
          class="unit"
          *ngIf="p.quantity && p.unit">

          {{ p.quantity }}
          {{ p.unit }}

        </p>

        <p
          class="unit"
          *ngIf="!p.quantity && p.unit">

          {{ p.unit }}

        </p>

        <div class="delivery">

          <span>
            ◷ 1 hr
          </span>

        </div>

      </div>

    </article>

  </div>

</div>

    </main>


    <!-- =========================
         MOBILE ORDER BAR
    ========================== -->

    <div class="mobile-order-bar">

      <button
        type="button"
        class="chat-btn"
      >
        💬
      </button>


      <button
        type="button"
        class="order-btn"
      >
        {{ t('placeOrder') }}
      </button>

    </div>

  </div>

</div>


<!-- =========================
     FOOTER
========================== -->

<app-footer>
</app-footer>
