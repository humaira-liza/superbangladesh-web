<div class="page">

  <div class="layout">

    <!-- =========================
         DESKTOP SIDEBAR
         ALWAYS OPEN
    ========================== -->

    <aside class="desktop-sidebar">

      <app-sidebar>
      </app-sidebar>

    </aside>


    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main class="main-content">


      <!-- =========================
           BANNER
      ========================== -->

      <app-banner
        *ngIf="!currentSearch"
      >
      </app-banner>


      <!-- =========================
           FEATURES
      ========================== -->

      <app-features
        *ngIf="!currentSearch"
      >
      </app-features>


      <!-- =========================
           POPULAR CATEGORIES
      ========================== -->

      <section
        class="popular-section"

        *ngIf="
          !currentSearch &&
          popularCategories.length > 0
        "
      >

        <h2>
          🔥 {{ t('popularCategories') }}
        </h2>


        <div class="popular-grid-container">

          <div class="popular-grid">

            <div
              class="popular-card"

              *ngFor="
                let c of popularCategories
              "

              (click)="
                onCategory(c)
              "
            >

              <img
                loading="lazy"
                decoding="async"

                [src]="
                  getCategoryImage(
                    c.imageUrl ||
                    c.image_url
                  )
                "

                (error)="
                  onImgError($event)
                "
              />


              <p>
                {{ categoryName(c) }}
              </p>

            </div>

          </div>

        </div>

      </section>


      <!-- =========================
           SHOP MORE
      ========================== -->

      <app-shop-more
        *ngIf="!currentSearch"
      >
      </app-shop-more>


      <!-- =========================
           POPULAR BRANDS
      ========================== -->

      <app-popular-brands
        *ngIf="!currentSearch"
      >
      </app-popular-brands>


    </main>


    <!-- =========================
         MOBILE ORDER BAR
    ========================== -->

    <div class="mobile-order-bar">

      <button
        type="button"
        class="chat-btn"
      >
        💬
      </button>


      <button
        type="button"
        class="order-btn"
      >
        {{ t('placeOrder') }}
      </button>

    </div>

  </div>

</div>


<!-- =========================
     FOOTER
========================== -->

<app-footer>
</app-footer>
