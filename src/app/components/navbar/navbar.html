<!-- =========================
     MOBILE HEADER
========================= -->


<div class="mobile-header">

  <!-- LEFT -->
<button
  type="button"
  class="menu-btn"
  (click)="toggleSidebar()"
>
    <i class="fa-solid fa-bars"></i>
  </button>

  <!-- CENTER -->
  <div
    class="mobile-brand"
    (click)="goHome()"
  >
    <img
      src="/images/love-logo.png"
      class="brand-logo"
      alt="Super Bangladesh"
    >

    <span>
      Super<br>
      Bangladesh
    </span>

  </div>

  <!-- RIGHT -->
<div class="mobile-actions">

  <div class="mobile-language-switch">

    <span
      [class.active]="selectedLanguage === 'en'"
      (click)="changeLanguage('en')">
      EN
    </span>

    <span class="divider">/</span>

    <span
      [class.active]="selectedLanguage === 'bn'"
      (click)="changeLanguage('bn')">
      বাং
    </span>

  </div>

</div>

</div>

<div
  class="mobile-overlay"
  *ngIf="sidebarOpen"
  (click)="toggleSidebar()"
>
</div>

<div
  class="mobile-sidebar"
  *ngIf="sidebarOpen"
>

  <div class="sidebar-content">

    <app-sidebar
      (categoryClick)="onMobileCategory($event)">
    </app-sidebar>

  </div>

  <div class="sidebar-account">

    <a
  *ngIf="isLoggedIn()"
  (click)="logout(); sidebarOpen=false">
  <i class="fa-solid fa-right-from-bracket"></i>
  {{ t('logout') }}
</a>

<a
  *ngIf="!isLoggedIn()"
  routerLink="/login"
  (click)="sidebarOpen=false">
  <i class="fa-solid fa-right-to-bracket"></i>
  {{ t('login') }}
</a>
  </div>

</div>


<!-- =========================
     DESKTOP NAVBAR
========================= -->

<div class="navbar">


  <div
    class="desktop-menu-wrapper"
    (click)="$event.stopPropagation()"
  >

    <button
      type="button"
      class="desktop-menu-btn"
      (click)="toggleDesktopMenu($event)"
      aria-label="Open account menu"
    >
      <i class="fa-solid fa-bars"></i>
    </button>

    <div
  class="desktop-account-menu"
  *ngIf="desktopMenuOpen && !isMobile"
>

  <a
    routerLink="/"
    (click)="closeDesktopMenu()"
  >
    <i class="fa-solid fa-house"></i>
    <span>{{ t('home') }}</span>
  </a>

<a
  *ngIf="isLoggedIn() && !isAdmin()"
  routerLink="/account"
  (click)="closeDesktopMenu()"
>
  <i class="fa-solid fa-user"></i>
  <span>Account</span>
</a>

  <a
    *ngIf="isAdmin()"
    routerLink="/admin/dashboard"
    (click)="closeDesktopMenu()"
  >
    <i class="fa-solid fa-user-shield"></i>
    <span>{{ t('adminDashboard') }}</span>
  </a>

</div>

  </div>


  <div class="left">


    <div
      class="brand"
      (click)="goHome()"
    >

      <img
        src="/images/love-logo.png"
        alt="Super Bangladesh Logo"
        class="brand-logo"
      />


      <div class="logo">
        Super Bangladesh
      </div>

    </div>


    <div
  class="search"
  *ngIf="!isMobile"
>

      <input
        type="text"
        [(ngModel)]="searchText"
        (input)="search()"
        [placeholder]="t('searchProductsExample')"
      />


      <button
        *ngIf="searchText"
        type="button"
        class="clear-btn"
        (click)="clearSearch()"
      >
        ✕
      </button>


      <button
        type="button"
        class="search-btn"
        (click)="search()"
      >
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>

    </div>


    <div class="location-wrapper">

      <button
        type="button"
        class="location-btn"
        (click)="toggleLocationMenu($event)"
      >

        <i class="fa-solid fa-location-dot"></i>

        <span>
          {{ getSelectedLocationLabel() }}
        </span>

        <i
          class="fa-solid fa-chevron-down location-arrow"
        >
        </i>

      </button>


      <div
        class="location-dropdown"
        *ngIf="showLocationMenu"
        (click)="$event.stopPropagation()"
      >

        <button
          type="button"
          (click)="selectLocation('Dhaka')"
        >
          {{ t('dhaka') }}
        </button>


        <button
          type="button"
          (click)="selectLocation('Chattogram')"
        >
          {{ t('chattogram') }}
        </button>


        <button
          type="button"
          (click)="selectLocation('Sylhet')"
        >
          {{ t('sylhet') }}
        </button>


        <button
          type="button"
          (click)="selectLocation('Rajshahi')"
        >
          {{ t('rajshahi') }}
        </button>


        <button
          type="button"
          (click)="selectLocation('Khulna')"
        >
          {{ t('khulna') }}
        </button>

      </div>

    </div>

  </div>


  <div class="right">


    <div class="language-switcher">

      <button
        type="button"
        [class.active]="
          selectedLanguage === 'en'
        "
        (click)="changeLanguage('en')"
      >
        English
      </button>


      <span>
        |
      </span>


      <button
        type="button"
        [class.active]="
          selectedLanguage === 'bn'
        "
        (click)="changeLanguage('bn')"
      >
        বাংলা
      </button>

    </div>


    <a
      *ngIf="!isLoggedIn()"
      routerLink="/login"
    >
      {{ t('login') }}
    </a>


    <a
      *ngIf="isLoggedIn()"
      (click)="logout()"
    >
      {{ t('logout') }}
    </a>

  </div>

</div>


<!-- =========================
     FLOATING CART
========================= -->

<div
  class="floating-cart"
  (click)="openCartDrawer()"
>

  <div class="cart-top">

    <div class="cart-count">

      {{ cart.count() }}

      {{ t('items') }}

    </div>


    <div class="cart-icon">
      <i class="fa-solid fa-cart-shopping"></i>
    </div>

  </div>


  <div class="price">
    ৳ {{ cart.getTotal() }}
  </div>

</div>


<!-- =========================
     FLOATING CHAT
========================= -->

<div class="chat-wrapper">


  <div
    class="chat-options"
    *ngIf="showChat"
  >


    <a
      href="tel:+8801756442133"
      class="chat-item call"
      [title]="t('call')"
    >
      <i class="fa-solid fa-phone"></i>
    </a>


    <a
      href="https://www.facebook.com/share/1C1rQ6txJr/"
      target="_blank"
      rel="noopener noreferrer"
      class="chat-item messenger"
      [title]="t('messenger')"
    >
      <i class="fa-brands fa-facebook-messenger"></i>
    </a>


    <a
      href="https://wa.me/8801756442133"
      target="_blank"
      rel="noopener noreferrer"
      class="chat-item whatsapp"
      [title]="t('whatsapp')"
    >
      <i class="fa-brands fa-whatsapp"></i>
    </a>

  </div>


  <button
    type="button"
    class="main-chat-btn"
    (click)="toggleChat()"
    [title]="t('chat')"
  >
    <i class="fa-solid fa-comments"></i>
  </button>

</div>

<!-- MOBILE BOTTOM NAV -->

<nav class="mobile-bottom-nav">

 <a
  routerLink="/"
  (click)="goHome()"
>
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>

  <button
    type="button"
    (click)="toggleSidebar()"
  >
    <i class="fa-solid fa-table-cells"></i>
    <span>Menu</span>
  </button>

  <button
    type="button"
    (click)="openCartDrawer()"
    class="cart-nav"
  >
    <i class="fa-solid fa-cart-shopping"></i>

    <span
      class="nav-badge"
      *ngIf="cart.count()"
    >
      {{ cart.count() }}
    </span>

    <span>Cart</span>
  </button>

  <button
  type="button"
  (click)="toggleMobileSearch()"
>
    <i class="fa-solid fa-magnifying-glass"></i>
    <span>Search</span>
  </button>

<!-- User -->
<a
  *ngIf="isLoggedIn() && !isAdmin()"
  routerLink="/account"
>
  <i class="fa-solid fa-user"></i>
  <span>Account</span>
</a>

<!-- Admin -->
<a
  *ngIf="isAdmin()"
  routerLink="/admin/dashboard"
>
  <i class="fa-solid fa-user-shield"></i>
  <span>Admin</span>
</a>
<a
  *ngIf="!isLoggedIn()"
  routerLink="/login"
>
  <i class="fa-solid fa-user"></i>
  <span>Login</span>
</a>

</nav>
