<section
  class="popular-brands"
  *ngIf="
    !loading &&
    brands.length > 0
  "
>

  <h2>
    Popular Brands
  </h2>


  <div class="brands-grid">

    <article
      class="brand-card"

      *ngFor="
        let brand of brands;
        trackBy: trackByBrand
      "
    >

      <div class="brand-logo">

        <img
          *ngIf="brand.imageUrl"
          [src]="brand.imageUrl"
          [alt]="brand.name"
          loading="lazy"
          decoding="async"
          (error)="onImageError($event)"
        >

        <span
          *ngIf="!brand.imageUrl"
          class="brand-fallback"
        >
          🏷️
        </span>

      </div>


      <p>
        {{ brand.name }}
      </p>

    </article>

  </div>

</section>
