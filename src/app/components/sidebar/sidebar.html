<div class="sidebar">

  <!-- TOP QUICK LINKS -->

  <div class="quick-links">

    <a
      class="quick-item"
      routerLink="/offers"
      (click)="closeSidebar()">

      <span class="quick-icon">🎁</span>

      <span>
        Offers
      </span>

    </a>


    <a
      class="quick-item"
      routerLink="/rewards"
      (click)="closeSidebar()">

      <span class="quick-icon">☆</span>

      <span>
        Rewards
      </span>

    </a>

  </div>


  <!-- DIVIDER -->

  <div class="divider"></div>


  <!-- ===================== -->
  <!-- MAIN CATEGORIES -->
  <!-- ===================== -->

  <div
    *ngFor="let c of categories">

    <!-- MAIN -->

    <div
      class="item"
      [class.active]="selectedId === c.id"
      (click)="handleMain(c, $event)">

      <span class="item-icon">
        {{ getCategoryIcon(c.name) }}
      </span>

      <span class="item-name">
        {{ c.name }}
      </span>

      <span
        *ngIf="c.children?.length"
        class="arrow"
        [class.open]="expandedMain === c.id">

        ›

      </span>

    </div>


    <!-- ===================== -->
    <!-- SUB CATEGORIES -->
    <!-- ===================== -->

    <div
      *ngIf="expandedMain === c.id"
      class="sub">

      <div
        *ngFor="let s of c.children">

        <div
          class="sub-item"
          [class.active]="selectedId === s.id"
          (click)="handleSub(s, c, $event)">

          <span class="sub-dot"></span>

          <span class="item-name">
            {{ s.name }}
          </span>

          <span
            *ngIf="s.children?.length"
            class="arrow"
            [class.open]="expandedSub === s.id">

            ›

          </span>

        </div>


        <!-- ===================== -->
        <!-- CHILD CATEGORIES -->
        <!-- ===================== -->

        <div
          *ngIf="
            expandedSub === s.id &&
            s.children?.length
          "
          class="child">

          <div
            *ngFor="let ch of s.children"
            class="child-item"
            [class.active]="selectedId === ch.id"
            (click)="handleChild(
              ch,
              s,
              c,
              $event
            )">

            <span class="child-dot"></span>

            <span class="item-name">
              {{ ch.name }}
            </span>

          </div>

        </div>

      </div>

    </div>

  </div>


  <!-- DIVIDER -->

  <div class="divider"></div>


  <!-- EXTRA LINKS -->

  <div class="extra">

    <a
      class="link"
      routerLink="/safety"
      (click)="closeSidebar()">

      <span class="link-icon">
        🛡️
      </span>

      <span>
        Safety Center
      </span>

    </a>


    <a
      class="link"
      routerLink="/premium"
      (click)="closeSidebar()">

      <span class="link-icon">
        🥇
      </span>

      <span>
        Premium Care
      </span>

    </a>


    <a
      class="link"
      routerLink="/help"
      (click)="closeSidebar()">

      <span class="link-icon">
        📞
      </span>

      <span>
        Help
      </span>

    </a>


    <a
      class="link"
      routerLink="/complaint"
      (click)="closeSidebar()">

      <span class="link-icon">
        ⚠️
      </span>

      <span>
        File a Complaint
      </span>

    </a>


    <a
      *ngIf="isAdmin"
      class="link"
      routerLink="/admin/suppliers"
      (click)="closeSidebar()">

      <span class="link-icon">
        🚚
      </span>

      <span>
        Suppliers
      </span>

    </a>

  </div>

</div>
